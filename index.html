<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FridgeVibe • Spoonacular</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="bg-zinc-950 text-white p-6 max-w-5xl mx-auto">

    <h1 class="text-4xl font-bold mb-6">🥶 FridgeVibe</h1>

    <!-- API Key Section -->
    <div class="mb-8 bg-zinc-900 p-6 rounded-3xl border border-zinc-700">
        <p class="text-sm text-zinc-400 mb-3">Spoonacular API Key</p>
        <div class="flex gap-3">
            <input id="apiKeyInput" type="password" placeholder="bb101a3e101048aa9c3f077710303f07" 
                   class="flex-1 bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-3 focus:outline-none focus:border-emerald-500">
            <button onclick="saveApiKey()" class="bg-emerald-500 hover:bg-emerald-600 px-8 rounded-2xl font-medium">Save Key</button>
            <button onclick="toggleKeyVisibility()" class="bg-zinc-700 hover:bg-zinc-600 px-6 rounded-2xl">👁</button>
        </div>
        <p id="keyStatus" class="text-xs mt-3 text-emerald-400"></p>
    </div>

    <!-- Diet Filters -->
    <div class="mb-6">
        <p class="text-zinc-400 mb-2">Diet Filters</p>
        <div id="diet" class="flex flex-wrap gap-2"></div>
    </div>

    <!-- Ingredient Input -->
    <div class="flex gap-3 mb-8">
        <input id="input" class="flex-1 bg-zinc-900 border border-zinc-700 rounded-2xl px-6 py-4 text-lg focus:outline-none focus:border-emerald-500"
               placeholder="chicken, marinara sauce, cheese, bread...">
        <button onclick="addIngredient()" class="bg-emerald-500 hover:bg-emerald-600 px-8 rounded-2xl font-medium">Add</button>
        <button onclick="openCamera()" class="bg-blue-600 hover:bg-blue-700 px-8 rounded-2xl font-medium">📷 Camera</button>
    </div>

    <div id="list" class="flex flex-wrap gap-3 mb-10"></div>

    <button onclick="findRecipes()" class="w-full bg-white text-black py-5 rounded-3xl text-xl font-semibold hover:bg-emerald-400 transition">
        🔍 Find Real Matching Recipes
    </button>

    <div id="results" class="grid grid-cols-1 md:grid-cols-2 gap-8 mt-10"></div>

    <!-- Camera Modal (basic version) -->
    <div id="camera-modal" class="hidden fixed inset-0 bg-black/95 z-50 flex items-center justify-center p-4">
        <div class="bg-zinc-900 rounded-3xl max-w-lg w-full overflow-hidden">
            <div class="p-5 border-b flex justify-between">
                <h3 class="text-xl font-semibold">📸 Scan Your Fridge</h3>
                <button onclick="closeCameraModal()" class="text-3xl">×</button>
            </div>
            <div class="p-5">
                <video id="video" autoplay playsinline class="w-full rounded-2xl bg-black aspect-video"></video>
            </div>
            <div class="p-5 flex gap-3">
                <button onclick="takePhoto()" class="flex-1 bg-emerald-500 py-4 rounded-2xl font-medium">Take Photo</button>
                <button onclick="closeCameraModal()" class="flex-1 bg-zinc-700 py-4 rounded-2xl font-medium">Cancel</button>
            </div>
            <div id="photo-review" class="hidden p-5 border-t">
                <img id="captured-photo" class="w-full rounded-2xl mb-4">
                <textarea id="extracted-items" rows="6" class="w-full bg-zinc-800 rounded-2xl p-4" placeholder="Type ingredients one per line..."></textarea>
                <div class="flex gap-3 mt-5">
                    <button onclick="addScannedIngredients()" class="flex-1 bg-emerald-500 py-4 rounded-2xl font-medium">Add to Fridge</button>
                    <button onclick="retakePhoto()" class="flex-1 bg-zinc-700 py-4 rounded-2xl font-medium">Retake</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let ingredients = [];
        let selectedDiets = [];
        let apiKey = localStorage.getItem("spoonacularKey") || "";
        let videoStream = null;

        const dietOptions = ["vegan", "vegetarian", "gluten-free", "dairy-free", "keto"];

        function renderDiets() {
            document.getElementById("diet").innerHTML = dietOptions.map(d => `
                <button onclick="toggleDiet('${d}')" class="px-6 py-3 bg-zinc-800 hover:bg-zinc-700 rounded-3xl transition ${selectedDiets.includes(d) ? 'bg-emerald-500 text-black' : ''}">${d}</button>
            `).join('');
        }

        function toggleDiet(d) {
            if (selectedDiets.includes(d)) selectedDiets = selectedDiets.filter(x => x !== d);
            else selectedDiets.push(d);
            renderDiets();
        }

        function saveApiKey() {
            apiKey = document.getElementById("apiKeyInput").value.trim();
            if (apiKey) {
                localStorage.setItem("spoonacularKey", apiKey);
                document.getElementById("keyStatus").textContent = "✅ Key saved!";
                setTimeout(() => document.getElementById("keyStatus").textContent = "", 3000);
            }
        }

        function toggleKeyVisibility() {
            const input = document.getElementById("apiKeyInput");
            input.type = input.type === "password" ? "text" : "password";
        }

        function addIngredient() {
            let val = document.getElementById("input").value.trim().toLowerCase();
            if (!val || ingredients.includes(val)) return;
            ingredients.push(val);
            document.getElementById("input").value = "";
            renderIngredients();
        }

        function renderIngredients() {
            document.getElementById("list").innerHTML = ingredients.map((item, i) => `
                <div class="bg-zinc-800 px-5 py-3 rounded-3xl inline-flex items-center gap-3">
                    ${item} <button onclick="removeIngredient(${i})" class="text-red-400">✕</button>
                </div>
            `).join('');
        }

        function removeIngredient(i) {
            ingredients.splice(i, 1);
            renderIngredients();
        }

        function openCamera() {
            alert("Camera feature coming soon. Add ingredients manually for now.");
        }

        async function findRecipes() {
            if (!apiKey) {
                alert("Please enter and save your Spoonacular API key first!");
                return;
            }
            if (ingredients.length === 0) {
                alert("Add some ingredients first!");
                return;
            }

            const resultsDiv = document.getElementById("results");
            resultsDiv.innerHTML = `<div class="col-span-2 text-center py-16"><i class="fas fa-spinner fa-spin text-5xl text-emerald-400"></i><p>Searching for Chicken Parm style recipes...</p></div>`;

            const ingredientsString = ingredients.join(",");

            try {
                const url = `https://api.spoonacular.com/recipes/findByIngredients?ingredients=${encodeURIComponent(ingredientsString)}&number=30&ranking=2&ignorePantry=true&apiKey=${apiKey}`;
                
                const res = await fetch(url);
                const recipes = await res.json();

                if (!recipes || recipes.length === 0) {
                    resultsDiv.innerHTML = `<div class="col-span-2 text-center py-16 text-zinc-400">No recipes found.<br>Try adding "pasta", "tomato sauce", or "mozzarella".</div>`;
                    return;
                }

                let html = '';
                for (let r of recipes) {
                    const usedCount = r.usedIngredientCount;
                    const missedCount = r.missedIngredientCount;
                    const percent = Math.round((usedCount / (usedCount + missedCount)) * 100);

                    html += `
                        <div class="recipe-card bg-zinc-900 rounded-3xl overflow-hidden border border-zinc-800">
                            <img src="${r.image}" class="w-full h-56 object-cover">
                            <div class="p-6">
                                <h3 class="font-semibold text-xl mb-2">${r.title}</h3>
                                <p class="text-emerald-400">${percent}% match • ${usedCount} ingredients used</p>
                                <div class="mt-4 text-sm">
                                    <span class="text-emerald-300">Have: ${r.usedIngredients.map(i => i.name).slice(0,5).join(", ")}</span><br>
                                    ${missedCount > 0 ? `<span class="text-red-400">Missing: ${r.missedIngredients.map(i => i.name).slice(0,5).join(", ")}</span>` : `<span class="text-emerald-400">✅ You have everything!</span>`}
                                </div>
                                <a href="https://spoonacular.com/recipes/${r.title.toLowerCase().replace(/ /g, '-')}-${r.id}" target="_blank" 
                                   class="block mt-6 text-center bg-zinc-800 hover:bg-zinc-700 py-4 rounded-2xl font-medium">
                                    View Full Recipe →
                                </a>
                            </div>
                        </div>
                    `;
                }
                resultsDiv.innerHTML = html;

            } catch (err) {
                resultsDiv.innerHTML = `<div class="col-span-2 text-red-400 text-center py-16">Error: ${err.message}<br>Check your API key.</div>`;
            }
        }

        // Initialize
        renderDiets();
        renderIngredients();

        if (apiKey) document.getElementById("apiKeyInput").value = apiKey;
    </script>
</body>
</html>
