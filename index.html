<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FridgeVibe</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="bg-zinc-950 text-white p-6 max-w-5xl mx-auto">

    <h1 class="text-4xl font-bold mb-6 flex items-center gap-3">
        🥶 FridgeVibe
    </h1>

    <!-- Diet Filters -->
    <div class="mb-6">
        <p class="text-zinc-400 mb-2">Diet Filters (hard filtered)</p>
        <div id="diet" class="flex flex-wrap gap-2"></div>
    </div>

    <!-- Ingredient Input -->
    <div class="flex gap-3 mb-8">
        <input id="input" class="flex-1 bg-zinc-900 border border-zinc-700 rounded-2xl px-6 py-4 text-lg focus:outline-none focus:border-emerald-500"
               placeholder="What's in your fridge?">
        <button onclick="addIngredient()" class="bg-emerald-500 hover:bg-emerald-600 px-8 rounded-2xl font-medium">Add</button>
        <button onclick="openCamera()" class="bg-blue-600 hover:bg-blue-700 px-8 rounded-2xl font-medium flex items-center gap-2">📷 Camera</button>
    </div>

    <div id="list" class="flex flex-wrap gap-3 mb-10"></div>

    <button onclick="findRecipes()" class="w-full bg-white text-black py-5 rounded-3xl text-xl font-semibold hover:bg-emerald-400 transition">
        🔍 Find Real Matching Recipes
    </button>

    <div id="results" class="grid grid-cols-1 md:grid-cols-2 gap-8 mt-10"></div>

    <!-- Camera Modal -->
    <div id="camera-modal" class="hidden fixed inset-0 bg-black/95 z-50 flex items-center justify-center p-4">
        <div class="bg-zinc-900 rounded-3xl max-w-lg w-full overflow-hidden">
            <div class="p-5 border-b flex justify-between">
                <h3 class="text-xl font-semibold">📸 Scan Your Fridge</h3>
                <button onclick="closeCameraModal()" class="text-3xl">×</button>
            </div>
            <div class="p-5">
                <video id="video" autoplay playsinline class="w-full rounded-2xl bg-black aspect-video"></video>
            </div>
            <div class="p-5 flex gap-3">
                <button onclick="takePhoto()" class="flex-1 bg-emerald-500 py-4 rounded-2xl font-medium">Take Photo</button>
                <button onclick="closeCameraModal()" class="flex-1 bg-zinc-700 py-4 rounded-2xl font-medium">Cancel</button>
            </div>
            <div id="photo-review" class="hidden p-5 border-t">
                <img id="captured-photo" class="w-full rounded-2xl mb-4">
                <textarea id="extracted-items" rows="6" class="w-full bg-zinc-800 rounded-2xl p-4" placeholder="Type ingredients one per line..."></textarea>
                <div class="flex gap-3 mt-5">
                    <button onclick="addScannedIngredients()" class="flex-1 bg-emerald-500 py-4 rounded-2xl font-medium">Add to Fridge</button>
                    <button onclick="retakePhoto()" class="flex-1 bg-zinc-700 py-4 rounded-2xl font-medium">Retake</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let ingredients = [];
        let selectedDiets = [];
        
        // === YOUR HARDCODED SPOONACULAR API KEY ===
        const apiKey = "bb101a3e101048aa9c3f077710303f07";   // ← Replace with your real key

        let videoStream = null;

        const dietOptions = ["vegan", "vegetarian", "gluten-free", "dairy-free", "keto"];

        function renderDiets() {
            document.getElementById("diet").innerHTML = dietOptions.map(d => `
                <button onclick="toggleDiet('${d}')" 
                        class="px-6 py-3 bg-zinc-800 hover:bg-zinc-700 rounded-3xl transition ${selectedDiets.includes(d) ? 'bg-emerald-500 text-black font-medium' : ''}">
                    ${d}
                </button>
            `).join('');
        }

        function toggleDiet(d) {
            if (selectedDiets.includes(d)) selectedDiets = selectedDiets.filter(x => x !== d);
            else selectedDiets.push(d);
            renderDiets();
        }

        function addIngredient() {
            let val = document.getElementById("input").value.trim().toLowerCase();
            if (!val || ingredients.includes(val)) return;
            ingredients.push(val);
            document.getElementById("input").value = "";
            renderIngredients();
        }

        function renderIngredients() {
            document.getElementById("list").innerHTML = ingredients.map((item, i) => `
                <div class="bg-zinc-800 px-5 py-3 rounded-3xl inline-flex items-center gap-3">
                    ${item} <button onclick="removeIngredient(${i})" class="text-red-400 hover:text-red-500">✕</button>
                </div>
            `).join('');
        }

        function removeIngredient(i) {
            ingredients.splice(i, 1);
            renderIngredients();
        }

        // Camera functions (unchanged)
        function openCamera() { /* ... same as before ... */ 
            document.getElementById("camera-modal").classList.remove("hidden");
            document.getElementById("photo-review").classList.add("hidden");
            startCamera();
        }

        function closeCameraModal() {
            document.getElementById("camera-modal").classList.add("hidden");
            if (videoStream) videoStream.getTracks().forEach(t => t.stop());
        }

        async function startCamera() {
            const video = document.getElementById("video");
            try {
                videoStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                video.srcObject = videoStream;
            } catch (e) {
                alert("Could not access camera.");
                closeCameraModal();
            }
        }

        function takePhoto() {
            const video = document.getElementById("video");
            const canvas = document.createElement("canvas");
            canvas.width = video.videoWidth || 1280;
            canvas.height = video.videoHeight || 720;
            canvas.getContext("2d").drawImage(video, 0, 0);
            document.getElementById("captured-photo").src = canvas.toDataURL("image/jpeg", 0.85);
            document.getElementById("photo-review").classList.remove("hidden");
        }

        function retakePhoto() {
            document.getElementById("photo-review").classList.add("hidden");
            startCamera();
        }

        function addScannedIngredients() {
            const lines = document.getElementById("extracted-items").value.trim().split("\n").filter(l => l.trim());
            lines.forEach(line => {
                const item = line.trim().toLowerCase();
                if (item && !ingredients.includes(item)) ingredients.push(item);
            });
            renderIngredients();
            closeCameraModal();
        }

        async function findRecipes() {
            if (!apiKey || apiKey === "YOUR_API_KEY_HERE") {
                alert("Please replace 'YOUR_API_KEY_HERE' with your actual Spoonacular API key.");
                return;
            }
            if (ingredients.length === 0) {
                alert("Add some ingredients first!");
                return;
            }

            const resultsDiv = document.getElementById("results");
            resultsDiv.innerHTML = `<div class="col-span-2 text-center py-16"><i class="fas fa-spinner fa-spin text-5xl text-emerald-400"></i><p>Searching for best matches...</p></div>`;

            const ingredientsString = ingredients.join(",");

            try {
                let url = `https://api.spoonacular.com/recipes/findByIngredients?ingredients=${encodeURIComponent(ingredientsString)}&number=30&ranking=2&ignorePantry=true&apiKey=${apiKey}`;

                // Add hard diet filters
                if (selectedDiets.length > 0) {
                    url += `&diet=${selectedDiets.join(',')}`;
                }

                const res = await fetch(url);
                let recipes = await res.json();

                if (!recipes || recipes.length === 0) {
                    resultsDiv.innerHTML = `<div class="col-span-2 text-center py-16 text-zinc-400">No recipes found matching your ingredients and diets.</div>`;
                    return;
                }

                // Sort by match quality (used ingredients descending)
                recipes.sort((a, b) => b.usedIngredientCount - a.usedIngredientCount);

                let html = '';
                for (let r of recipes) {
                    const totalIngredients = r.usedIngredientCount + r.missedIngredientCount;
                    const matchPercent = totalIngredients > 0 ? Math.round((r.usedIngredientCount / totalIngredients) * 100) : 0;

                    const haveList = r.usedIngredients.map(i => `<span class="inline-flex items-center gap-1"><i class="fas fa-check text-emerald-400"></i>${i.name}</span>`).slice(0, 6).join(" • ");
                    const missList = r.missedIngredients.map(i => `<span class="inline-flex items-center gap-1"><i class="fas fa-times text-red-400"></i>${i.name}</span>`).slice(0, 6).join(" • ");

                    html += `
                        <div class="recipe-card bg-zinc-900 rounded-3xl overflow-hidden border border-zinc-800">
                            <img src="${r.image}" class="w-full h-56 object-cover">
                            <div class="p-6">
                                <h3 class="font-semibold text-xl mb-3">${r.title}</h3>
                                
                                <!-- Match Score -->
                                <div class="flex items-center gap-3 mb-4">
                                    <div class="flex-1 bg-zinc-800 h-2.5 rounded-full overflow-hidden">
                                        <div class="h-full bg-gradient-to-r from-emerald-400 to-emerald-500" 
                                             style="width: ${matchPercent}%"></div>
                                    </div>
                                    <span class="text-emerald-400 font-medium">${matchPercent}% match</span>
                                </div>

                                <!-- Used Ingredients -->
                                <div class="mb-4">
                                    <div class="flex justify-between text-sm mb-1">
                                        <span class="text-emerald-400 font-medium">Have (${r.usedIngredientCount})</span>
                                    </div>
                                    <div class="text-sm text-zinc-300 leading-relaxed">${haveList || '—'}</div>
                                </div>

                                <!-- Missing Ingredients -->
                                ${r.missedIngredientCount > 0 ? `
                                <div>
                                    <div class="flex justify-between text-sm mb-1">
                                        <span class="text-red-400 font-medium">Missing (${r.missedIngredientCount})</span>
                                    </div>
                                    <div class="text-sm text-zinc-400 leading-relaxed">${missList}</div>
                                </div>` : `
                                <div class="text-emerald-400 text-sm font-medium mt-2">✅ You have everything needed!</div>`}

                                <a href="https://spoonacular.com/recipes/${r.title.toLowerCase().replace(/ /g, '-')}-${r.id}" 
                                   target="_blank" 
                                   class="block mt-6 text-center bg-zinc-800 hover:bg-emerald-600 hover:text-white py-4 rounded-2xl font-medium transition">
                                    View Full Recipe →
                                </a>
                            </div>
                        </div>
                    `;
                }
                resultsDiv.innerHTML = html;

            } catch (err) {
                resultsDiv.innerHTML = `<div class="col-span-2 text-red-400 text-center py-16">Error loading recipes.<br>Check your API key and connection.</div>`;
            }
        }

        // Initialize
        renderDiets();
        renderIngredients();
    </script>
</body>
</html>
