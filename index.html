<!DOCTYPE html>
<html lang="en" class="bg-zinc-950 text-white">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FridgeVibe</title>

<script src="https://cdn.tailwindcss.com"></script>

<!-- PWA -->
<link rel="manifest" href="data:application/json,{
  "name":"FridgeVibe",
  "short_name":"FridgeVibe",
  "start_url":".",
  "display":"standalone",
  "background_color":"#0a0a0a",
  "theme_color":"#10b981"
}">
<meta name="theme-color" content="#10b981">

<style>
body { font-family: system-ui; }
.recipe-card { transition: 0.3s; }
.recipe-card:hover { transform: translateY(-6px); }
</style>
</head>

<body class="min-h-screen pb-20">

<div class="max-w-5xl mx-auto px-6 py-10">

<h1 class="text-4xl font-bold text-center mb-6">🥶 FridgeVibe</h1>

<!-- INPUT -->
<div class="flex gap-3 mb-6">
<input id="ingredient-input"
class="flex-1 bg-zinc-800 p-3 rounded-xl"
placeholder="Add ingredient..."
onkeydown="if(event.key==='Enter') addIngredient()">
<button onclick="addIngredient()" class="bg-emerald-500 px-6 rounded-xl">+</button>
</div>

<div id="ingredients" class="flex flex-wrap gap-2 mb-6"></div>

<button onclick="findRecipes()" class="w-full bg-white text-black py-3 rounded-xl mb-8">
Find Recipes
</button>

<div id="results" class="grid md:grid-cols-2 lg:grid-cols-3 gap-6"></div>

<!-- FOOTER -->
<div class="text-center text-xs text-zinc-500 mt-12">
Recipe data via TheMealDB •
<button onclick="openPage('privacy')" class="underline">Privacy</button> •
<button onclick="openPage('terms')" class="underline">Terms</button>
</div>

</div>

<!-- MODAL (Privacy + Terms) -->
<div id="modal" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center p-6">
<div class="bg-zinc-900 max-w-xl w-full p-6 rounded-2xl">
<div id="modal-content"></div>
<button onclick="closeModal()" class="mt-6 w-full bg-emerald-500 py-2 rounded-xl">Close</button>
</div>
</div>

<script>

let ingredients = [];

/* ---------------- INPUT ---------------- /
function addIngredient(){
const input=document.getElementById('ingredient-input');
const val=input.value.trim().toLowerCase();
if(!val||ingredients.includes(val)) return;
ingredients.push(val);
input.value='';
render();
}

function render(){
document.getElementById('ingredients').innerHTML=
ingredients.map(i=><div class="bg-zinc-800 px-4 py-1 rounded-full">${i}</div>).join('');
}

/ ---------------- RECIPES ---------------- /
async function findRecipes(){
if(ingredients.length===0){
alert("Add ingredients first");
return;
}

const resDiv=document.getElementById('results');
resDiv.innerHTML="Loading...";

let meals=[];

for(let ing of ingredients){
try{
const res=await fetch(https://www.themealdb.com/api/json/v1/1/filter.php?i=${ing});
const data=await res.json();
if(data.meals) meals=meals.concat(data.meals);
}catch{}
}

const unique=[...new Map(meals.map(m=>[m.idMeal,m])).values()];

resDiv.innerHTML=unique.slice(0,12).map(r=><div class="bg-zinc-900 rounded-2xl overflow-hidden"> <img src="${r.strMealThumb}" class="w-full h-48 object-cover"> <div class="p-4"> <h3 class="font-semibold">${r.strMeal}</h3> <a class="text-emerald-400" target="_blank" href="https://www.themealdb.com/meal/${r.idMeal}"> View Recipe → </a> </div> </div>).join('');
}

/ ---------------- LEGAL MODAL ---------------- */
function openPage(type){
const modal=document.getElementById('modal');
const content=document.getElementById('modal-content');

if(type==="privacy"){
content.innerHTML= <h2 class="text-xl mb-2">Privacy Policy</h2> <p>No data is collected or stored.</p> <p>All processing happens locally in your browser.</p> <p>Camera (if used) stays on-device only.</p> <p>We use third-party recipe data from TheMealDB.</p>;
}

if(type==="terms"){
content.innerHTML= <h2 class="text-xl mb-2">Terms of Use</h2> <p>This app is provided as-is.</p> <p>No guarantees of recipe accuracy.</p> <p>Use at your own discretion.</p>;
}

modal.classList.remove('hidden');
}

function closeModal(){
document.getElementById('modal').classList.add('hidden');
}

</script>

</body>
</html>
