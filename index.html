<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FridgeVibe • Smarter Matching</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-950 text-white p-6 max-w-5xl mx-auto">
<h1 class="text-3xl font-bold mb-6">🥶 FridgeVibe</h1>
<!-- INPUT -->
<div class="flex gap-3 mb-6">
<input id="input" class="flex-1 p-3 rounded bg-zinc-900 border border-zinc-700"
placeholder="chicken, cheese, bread...">
<button onclick="addIngredient()" class="bg-emerald-500 px-5 rounded">
Add
</button>
</div>
<!-- INGREDIENTS -->
<div id="list" class="flex flex-wrap gap-2 mb-6"></div>
<button onclick="findRecipes()" class="bg-white text-black px-6 py-3 rounded mb-10">
Find Recipes
</button>
<!-- RESULTS -->
<div id="results" class="grid md:grid-cols-2 gap-6"></div>
<script>
let ingredients = [];
/* ---------------------------
ADD INGREDIENT
----------------------------/
function addIngredient(){
const val = document.getElementById("input").value.toLowerCase().trim();
if(!val || ingredients.includes(val)) return;
ingredients.push(val);
document.getElementById("input").value = "";
renderIngredients();
}
/ ---------------------------
RENDER INGREDIENTS
----------------------------/
function renderIngredients(){
document.getElementById("list").innerHTML =
ingredients.map(i => <span class="bg-zinc-800 px-3 py-1 rounded"> ${i} </span>).join("");
}
/ ---------------------------
CORE SEARCH ENGINE (FIXED)
----------------------------/
async function findRecipes(){
if(ingredients.length < 2){
alert("Add at least 2 ingredients for better results");
return;
}
const results = document.getElementById("results");
results.innerHTML = "Searching...";
let allMeals = [];
/ STEP 1: collect candidates /
for(let ing of ingredients){
try{
const res = await fetch(
https://www.themealdb.com/api/json/v1/1/filter.php?i=${ing}
);
const data = await res.json();
if(data.meals) allMeals.push(...data.meals);
}catch{}
}
/ STEP 2: remove duplicates /
const unique = [...new Map(allMeals.map(m => [m.idMeal, m])).values()];
let final = [];
/ STEP 3: analyze each recipe /
for(let meal of unique.slice(0, 40)){
try{
const res = await fetch(
https://www.themealdb.com/api/json/v1/1/lookup.php?i=${meal.idMeal}
);
const data = await res.json();
const r = data.meals?.[0];
if(!r) continue;
/ extract clean ingredients /
let recipeIngredients = [];
for(let i=1;i<=20;i++){
let ing = r[strIngredient${i}];
if(!ing) continue;
ing = ing.toLowerCase().trim();
/ remove junk ingredients /
if(
ing === "" ||
ing.includes("optional") ||
ing.length < 2
) continue;
recipeIngredients.push(ing);
}
/ ---------------------------
SMART MATCHING ENGINE
----------------------------/
let strong = 0;
let weak = 0;
for(let userIng of ingredients){
let matched = false;
for(let recipeIng of recipeIngredients){
/ STRONG MATCH /
if(recipeIng === userIng){
strong++;
matched = true;
break;
}
/ WEAK MATCH (controlled) /
if(
recipeIng.includes(userIng) &&
userIng.length > 3
){
weak++;
matched = true;
break;
}
}
}
/ IMPORTANT FILTER (fixes saffron issue) /
let score = (strong * 3) + weak;
/ 🚨 HARD CUTOFF (THIS FIXES YOUR ISSUE) /
if(score < 3) continue;
/ must match at least 2 ingredients realistically /
if(strong + weak < 2) continue;
/ build lists /
let have = [];
let missing = [];
recipeIngredients.forEach(rIng => {
let ok = ingredients.some(u =>
rIng === u || rIng.includes(u)
);
if(ok) have.push(rIng);
else missing.push(rIng);
});
/ final score /
let matchPercent = Math.min(
100,
Math.round((have.length / ingredients.length) * 100)
);
final.push({
name: r.strMeal,
img: r.strMealThumb,
id: r.idMeal,
have,
missing,
score: matchPercent
});
}catch{}
}
/ STEP 4: sort best matches /
final.sort((a,b) => b.score - a.score);
/ STEP 5: render */
if(final.length === 0){
results.innerHTML = "No realistic matches found.";
return;
}
results.innerHTML = final.slice(0,12).map(r => <div class="bg-zinc-900 rounded-xl overflow-hidden">  <img src="${r.img}" class="w-full h-48 object-cover">  <div class="p-4">  <h3 class="font-bold">${r.name}</h3>  <p class="text-emerald-400">${r.score}% match</p>  <p class="text-sm text-zinc-400 mt-2"> Have: ${r.have.slice(0,4).join(", ")} </p>  <p class="text-sm text-red-400 mt-1"> Missing: ${r.missing.slice(0,4).join(", ")} </p>  </div> </div>).join("");
}
</script>
</body>
</html>
